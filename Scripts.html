<script>
    const SCRIPT_URL = '<?= ScriptApp.getService().getUrl() ?>';
    let ADMIN_WA_NUMBER = '5213442533581';
    let dbProducts = [], cart = [], mockOrders = [], isAdmin = false, cmsData = {}, heroSlides = [], heroSwiper = null, currentSlideIndex = null;
    let cropper, cropTarget = null, draggedIndex = null;

    window.addEventListener('scroll', () => {
        const header = document.getElementById('header');
        header.classList.toggle('scrolled', window.scrollY > 50);
    });

    function showView(id) {
        if (id === 'admin' && !isAdmin) { loginAdmin(); return; }
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        const navItem = document.getElementById('nav-' + id);
        if (navItem) navItem.classList.add('active');
        if (id === 'admin') updateAdminPanel();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function loginAdmin() {
        Swal.fire({
            title: 'Acceso Staff', input: 'password', inputPlaceholder: 'Ingresa la contraseña',
            showCancelButton: true, confirmButtonText: 'Ingresar', cancelButtonText: 'Cancelar',
            confirmButtonColor: '#E8A598', background: '#FDF8F5'
        }).then(r => {
            if (r.value === 'admin123') {
                isAdmin = true;
                document.getElementById('admin-nav-item').style.display = 'block';
                showView('admin');
            } else if (r.isConfirmed) {
                Swal.fire({ icon: 'error', title: 'Contraseña incorrecta', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            }
        });
    }

    function sanitizeImgUrl(url) {
        if (!url) return 'https://images.unsplash.com/photo-1517433670267-08bbd4be890f?w=500';
        if (url.includes('drive.google.com/uc')) {
            const id = url.split('id=')[1];
            if (id) return `https://lh3.googleusercontent.com/d/${id}`;
        }
        return url;
    }

    function toggleCart(show) {
        document.getElementById('cart-drawer').classList.toggle('active', show);
        document.getElementById('overlay').classList.toggle('active', show);
        document.body.style.overflow = show ? 'hidden' : '';
    }

    // ===== CARRUSEL SLIDES =====
    function initHeroSwiper() {
        if (heroSwiper) {
            heroSwiper.destroy(true, true);
            heroSwiper = null;
        }

        if (heroSlides.length === 0) return;

        heroSwiper = new Swiper('.hero-swiper', {
            loop: heroSlides.length > 1,
            autoplay: heroSlides.length > 1 ? {
                delay: 5000,
                disableOnInteraction: false,
                pauseOnMouseEnter: true
            } : false,
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
                dynamicBullets: true
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev'
            },
            effect: 'fade',
            fadeEffect: { crossFade: true },
            speed: 1000,
            grabCursor: true
        });
    }

    function renderHeroSlides() {
        const container = document.getElementById('hero-slides');
        if (!container) return;
        container.innerHTML = '';

        const slidesToRender = heroSlides.length > 0 ? heroSlides : [{
            id: 'default',
            image: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200',
            title: 'Sabores Artesanales',
            subtitle: 'Pan recién horneado con amor y tradición',
            buttonText: 'Ver Tienda',
            buttonLink: 'tienda'
        }];

        slidesToRender.forEach((slide, index) => {
            const slideEl = document.createElement('div');
            slideEl.className = 'swiper-slide';
            const sImg = sanitizeImgUrl(slide.image);
            slideEl.innerHTML = `
                <img src="${sImg}" class="slide-bg" alt="${slide.title}" 
                     onerror="this.src='https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200'"
                     loading="${index === 0 ? 'eager' : 'lazy'}">
                <div class="hero-overlay">
                    <h1>${slide.title}</h1>
                    <p>${slide.subtitle}</p>
                    <button class="btn-primary" onclick="showView('${slide.buttonLink || 'tienda'}')">
                        <i class="fas fa-store"></i> ${slide.buttonText || 'Ver Tienda'}
                    </button>
                </div>`;
            container.appendChild(slideEl);
        });

        setTimeout(() => initHeroSwiper(), 100);
    }

    function renderSlidesManager() {
        const container = document.getElementById('slides-container');
        container.innerHTML = '';
        heroSlides.forEach((slide, index) => {
            const slideEl = document.createElement('div');
            slideEl.className = 'slide-item';
            slideEl.setAttribute('draggable', 'true');
            slideEl.dataset.index = index;
            slideEl.innerHTML = `
                <div class="slide-number">${index + 1}</div>
                <img src="${slide.image}" class="slide-preview" alt="">
                <div class="slide-info">
                    <div class="slide-title">${slide.title}</div>
                    <div class="slide-subtitle">${slide.subtitle}</div>
                </div>
                <div class="slide-actions">
                    <button class="slide-action-btn move" title="Arrastrar"><i class="fas fa-grip-vertical"></i></button>
                    <button class="slide-action-btn edit" onclick="editSlide(${index})" title="Editar"><i class="fas fa-edit"></i></button>
                    <button class="slide-action-btn delete" onclick="deleteSlide(${index})" title="Eliminar"><i class="fas fa-trash"></i></button>
                </div>`;
            slideEl.addEventListener('dragstart', handleDragStart);
            slideEl.addEventListener('dragover', handleDragOver);
            slideEl.addEventListener('drop', handleDrop);
            slideEl.addEventListener('dragend', handleDragEnd);
            container.appendChild(slideEl);
        });
    }

    function handleDragStart(e) { draggedIndex = parseInt(this.dataset.index); this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function handleDrop(e) {
        e.preventDefault();
        const dropIndex = parseInt(this.dataset.index);
        if (draggedIndex !== null && draggedIndex !== dropIndex) {
            const draggedSlide = heroSlides[draggedIndex];
            heroSlides.splice(draggedIndex, 1);
            heroSlides.splice(dropIndex, 0, draggedSlide);
            renderSlidesManager();
        }
    }
    function handleDragEnd() { this.classList.remove('dragging'); draggedIndex = null; }

    function addNewSlide() {
        if (heroSlides.length >= 5) {
            Swal.fire({ icon: 'warning', title: 'Límite alcanzado', text: 'Máximo 5 slides permitidos', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }
        currentSlideIndex = null;
        openSlideEditor();
    }

    function editSlide(index) { currentSlideIndex = index; openSlideEditor(heroSlides[index]); }

    function openSlideEditor(slide = null) {
        const isEdit = slide !== null;
        Swal.fire({
            title: isEdit ? 'Editar Slide' : 'Nuevo Slide',
            html: `
                <div style="text-align:left;">
                    <label style="font-size:12px; color:#6B5B54; font-weight:600;">Título</label>
                    <input id="slide-title" class="swal2-input" value="${slide?.title || ''}" placeholder="Ej: Sabores Artesanales" style="margin:5px 0 15px; width:90%;">
                    <label style="font-size:12px; color:#6B5B54; font-weight:600;">Subtítulo</label>
                    <input id="slide-subtitle" class="swal2-input" value="${slide?.subtitle || ''}" placeholder="Ej: Pan recién horneado..." style="margin:5px 0 15px; width:90%;">
                    <label style="font-size:12px; color:#6B5B54; font-weight:600;">Texto del Botón</label>
                    <input id="slide-button" class="swal2-input" value="${slide?.buttonText || 'Ver Tienda'}" placeholder="Ver Tienda" style="margin:5px 0 15px; width:90%;">
                    <label style="font-size:12px; color:#6B5B54; font-weight:600; display:block; margin-bottom:10px;">📸 Imagen de Fondo</label>
                    <div style="display:flex; flex-direction:column; gap:10px; align-items:center; background:var(--bg); padding:15px; border-radius:12px; margin-bottom:15px;">
                        <img id="slide-img-preview" src="${slide?.image ? sanitizeImgUrl(slide.image) : ''}" style="width:150px; height:85px; object-fit:cover; border-radius:8px; ${slide?.image ? '' : 'display:none;'}">
                        <button id="slide-file-btn" type="button" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600;">
                            <i class="fas fa-camera"></i> ${slide?.image ? 'Cambiar Imagen' : 'Subir Imagen'}
                        </button>
                        <input id="slide-file" type="file" accept="image/*" style="display:none;">
                    </div>
                </div>`,
            confirmButtonText: '<i class="fas fa-save"></i> Guardar', confirmButtonColor: '#E8A598', background: '#FDF8F5',
            showCancelButton: true, cancelButtonText: 'Cancelar',
            didOpen: () => {
                document.getElementById('slide-file-btn').onclick = () => document.getElementById('slide-file').click();
                document.getElementById('slide-file').onchange = async (e) => {
                    if (e.target.files[0]) {
                        cropTarget = 'slide';
                        startCrop(await processImageUpload(e.target.files[0]), 16 / 9);
                    }
                };
            },
            preConfirm: () => {
                const preview = document.getElementById('slide-img-preview');
                if (!preview.src && !preview.dataset.base64) { Swal.showValidationMessage('Por favor sube una imagen'); return false; }
                return { title: document.getElementById('slide-title').value || 'Sin título', subtitle: document.getElementById('slide-subtitle').value || '', buttonText: document.getElementById('slide-button').value || 'Ver Tienda', image: preview.dataset.base64 || preview.src, buttonLink: 'tienda' };
            }
        }).then(r => {
            if (r.isConfirmed) {
                if (isEdit) heroSlides[currentSlideIndex] = { ...heroSlides[currentSlideIndex], ...r.value };
                else heroSlides.push({ id: Date.now(), ...r.value });
                renderSlidesManager();
                Swal.fire({ icon: 'success', title: 'Guardado', timer: 1500, showConfirmButton: false, background: '#FDF8F5' });
            }
        });
    }

    function deleteSlide(index) {
        Swal.fire({ title: '¿Eliminar slide?', text: 'Esta acción no se puede deshacer', icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí, eliminar', cancelButtonText: 'Cancelar', confirmButtonColor: '#E57373', background: '#FDF8F5' }).then(r => {
            if (r.isConfirmed) { heroSlides.splice(index, 1); renderSlidesManager(); Swal.fire({ icon: 'success', title: 'Eliminado', timer: 1500, showConfirmButton: false, background: '#FDF8F5' }); }
        });
    }

    // ===== PRODUCTOS =====
    function renderGrid(id, list) {
        const container = document.getElementById(id);
        if (!container) return;
        container.innerHTML = '';
        list.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card' + (p.stock <= 0 ? ' out-of-stock' : '');
            card.setAttribute('data-id', p.id);
            card.onclick = () => openProductDetail(p.id);
            const pImg = sanitizeImgUrl(p.img);
            card.innerHTML = `
                <div class="p-qty-in-cart" data-id="${p.id}">0</div>
                <div class="p-img-container">
                    <img src="${pImg}" class="p-img" alt="${p.name}" loading="lazy" 
                         onerror="this.src='https://images.unsplash.com/photo-1517433670267-08bbd4be890f?w=500'">
                </div>
                <div class="p-content">
                    <h3 class="p-name">${p.name}</h3>
                    <p class="p-price">$${p.price}</p>
                    <p class="p-stock ${p.stock <= 0 ? 'low' : p.stock <= 5 ? 'low' : ''}">
                        ${p.stock <= 0 ? 'SIN STOCK' : 'STOCK: ' + p.stock + ' UN.'}
                    </p>
                    <div class="qty-selector" onclick="event.stopPropagation()">
                        <button class="qty-btn" onclick="changeQtyUI(this,-1,false)"><i class="fas fa-minus"></i></button>
                        <span class="qty-val">1</span>
                        <button class="qty-btn" onclick="changeQtyUI(this,1,false)"><i class="fas fa-plus"></i></button>
                    </div>
                    <button class="btn-add" onclick="event.stopPropagation(); addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''}>
                        ${p.stock <= 0 ? 'AGOTADO' : 'AÑADIR AL CARRITO'}
                    </button>
                </div>`;
            container.appendChild(card);
        });
        updateAllBadges();
    }

    function changeQtyUI(btn, delta, isModal = false) {
        const el = btn.parentElement.querySelector('.qty-val');
        let val = parseInt(el.innerText) + delta;
        if (val < 1) val = 1;
        el.innerText = val;
    }

    function addToCart(pid, qtyFromModal) {
        const product = dbProducts.find(x => String(x.id) === String(pid));

        if (!product) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Producto no encontrado en el catálogo.', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }

        if (product.stock <= 0) {
            Swal.fire({ icon: 'warning', title: 'Agotado', text: 'Lo sentimos, este producto no tiene stock disponible.', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }

        const qty = qtyFromModal || parseInt(document.querySelector(`.product-card[data-id="${pid}"] .qty-val`)?.innerText || "1");
        const existingItem = cart.find(x => String(x.id) === String(pid));

        if (((existingItem ? existingItem.qty : 0) + qty) > product.stock) {
            Swal.fire({ icon: 'warning', title: 'Stock insuficiente', text: `Solo quedan ${product.stock} unidades disponibles.`, confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }

        if (existingItem) existingItem.qty += qty;
        else cart.push({ ...product, qty });

        updateCartUI();
        updateAllBadges();

        Swal.fire({
            title: '¡Añadido!',
            text: `${product.name} agregado al carrito`,
            icon: 'success',
            toast: true,
            position: 'top-end',
            timer: 2000,
            showConfirmButton: false,
            background: '#FDF8F5'
        });
    }

    function updateCartUI() {
        const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cart-count').innerText = totalQty;
        const container = document.getElementById('cart-items');
        if (cart.length === 0) {
            container.innerHTML = `<div class="cart-empty"><i class="fas fa-shopping-basket"></i><p>Tu carrito está vacío</p><p style="font-size: 14px; margin-top: 8px;">¡Agrega algunos productos!</p></div>`;
            document.getElementById('shipping-details').style.display = 'none';
            document.getElementById('cart-footer').style.display = 'none';
            return;
        }
        container.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price * item.qty;
            container.innerHTML += `
                <div class="cart-item">
                    <img src="${sanitizeImgUrl(item.img)}" class="cart-item-img" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">$${item.price}</div>
                        <div class="cart-item-qty">Cantidad: ${item.qty}</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeCart(${index})" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                </div>`;
        });
        document.getElementById('cart-total').innerText = '$' + total.toLocaleString();
        document.getElementById('shipping-details').style.display = 'block';
        document.getElementById('cart-footer').style.display = 'block';
    }

    function removeCart(index) { cart.splice(index, 1); updateCartUI(); updateAllBadges(); }

    function updateAllBadges() {
        dbProducts.forEach(p => {
            const item = cart.find(x => String(x.id) === String(p.id));
            document.querySelectorAll(`.p-qty-in-cart[data-id="${p.id}"]`).forEach(badge => {
                badge.innerText = item ? item.qty : 0;
                badge.className = 'p-qty-in-cart' + (item ? ' visible' : '');
            });
        });
    }

    // PUENTE GAS NATIVO (REEMPLAZA FETCH)
    async function gsCall(action, data) {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(err => {
                    console.error('GAS Error:', err);
                    reject(err);
                })
                .runAction({ action: action, ...data });
        });
    }

    function updateAdminPanel() {
        const list = document.getElementById('admin-orders-list');
        const filter = document.getElementById('status-filter')?.value || 'todos';
        list.innerHTML = '';
        let totalSales = 0;

        mockOrders.slice().reverse().forEach(order => {
            const status = getV(order, ['est', 'stat', 'condition']);
            if (filter !== 'todos' && status !== filter) return;

            const amountVal = getV(order, ['total', 'monto', 'price']);
            const amount = parseFloat(amountVal) || 0;
            totalSales += amount;

            let itemsText = '---';
            const rawItems = getV(order, ['resumen', 'produc', 'items', 'content']);
            if (rawItems && rawItems !== '---') {
                try {
                    const parsed = typeof rawItems === 'string' ? JSON.parse(rawItems) : rawItems;
                    if (Array.isArray(parsed)) {
                        itemsText = parsed.map(it => `• ${it.name} x${it.qty}`).join('<br>');
                    } else {
                        itemsText = rawItems;
                    }
                } catch (e) {
                    itemsText = rawItems;
                }
            }

            const rawDate = getV(order, ['fech', 'date', 'momento', 'time']);
            let formattedDate = rawDate;
            if (rawDate && rawDate !== '---') {
                try {
                    const d = new Date(rawDate);
                    if (!isNaN(d.getTime())) {
                        formattedDate = `${d.toLocaleDateString()} ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
                    }
                } catch (e) { }
            }

            const clientName = getV(order, ['cliente', 'client', 'nombr', 'nombre', 'customer']);
            const isDelivered = status === 'Entregado';
            const orderId = getV(order, ['idpedido', 'id', 'nro', 'id_pedido']);

            list.innerHTML += `
                <tr>
                    <td><strong>#${orderId}</strong></td>
                    <td>${clientName !== '---' && clientName !== '' ? clientName : '<span style="color:#ccc;">(Sin nombre)</span>'}</td>
                    <td><a href="https://wa.me/${getV(order, ['tel', 'what', 'cel', 'phone'])}" target="_blank" style="color: var(--success);"><i class="fab fa-whatsapp"></i> ${getV(order, ['tel', 'what'])}</a></td>
                    <td>${getV(order, ['direc', 'ubic', 'addr'])}</td>
                    <td><div style="max-height:80px; overflow:auto; font-size:12px; line-height:1.4; background:rgba(0,0,0,0.03); padding:5px; border-radius:4px;">${itemsText}</div></td>
                    <td><strong>$${amount.toLocaleString()}</strong></td>
                    <td>${formattedDate}</td>
                    <td><span class="status-badge status-${isDelivered ? 'done' : 'pending'}">${status}</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn action-btn-success" onclick="markDone('${orderId}')" title="Marcar como entregado"><i class="fas fa-check"></i></button>
                            <button class="action-btn action-btn-primary" onclick="showOrderInvoice('${orderId}')" title="Ver factura"><i class="fas fa-file-invoice"></i></button>
                            <button class="action-btn action-btn-danger" onclick="deleteOrderAdmin('${orderId}')" title="Eliminar pedido"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
        });
        document.getElementById('stat-total').innerText = '$' + totalSales.toLocaleString();
        document.getElementById('stat-orders').innerText = mockOrders.length;
        document.getElementById('stat-low-stock').innerText = dbProducts.filter(p => p.stock <= 5).length;
        renderAdminProducts();
    }

    function getV(obj, tags) {
        if (!obj) return '---';
        const keys = Object.keys(obj);
        for (let tag of tags) {
            const exact = keys.find(k => k.toLowerCase() === tag.toLowerCase());
            if (exact && obj[exact] !== undefined && obj[exact] !== null) return obj[exact];
        }
        for (let tag of tags) {
            const lt = tag.toLowerCase();
            for (let k of keys) {
                const lk = k.toLowerCase();
                if (lt === 'est' && (lk.includes('fech') || lk.includes('date'))) continue;
                if (lt === 'fech' && (lk.includes('est') || lk.includes('stat'))) continue;
                if (lk.includes(lt)) return obj[k];
            }
        }
        return '---';
    }

    async function markDone(id) {
        const cleanId = String(id).replace('#', '').trim().toUpperCase();
        Swal.fire({
            title: 'Actualizando pedido...',
            text: `Pedido: ${cleanId}`,
            didOpen: () => Swal.showLoading(),
            allowOutsideClick: false,
            background: '#FDF8F5'
        });

        const orderIndex = mockOrders.findIndex(x => {
            const orderId = getV(x, ['idpedido', 'id', 'nro', 'ID Pedido', 'id pedido']);
            return String(orderId).trim().toUpperCase() === cleanId;
        });

        if (orderIndex === -1) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Pedido no encontrado en la lista local', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }

        const order = mockOrders[orderIndex];
        const statusKey = Object.keys(order).find(k => {
            const normalized = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return normalized.includes('est') || normalized.includes('stat');
        });

        if (statusKey) {
            await gsCall('updateOrderStatus', { orderId: cleanId, status: 'Entregado' });
            mockOrders[orderIndex][statusKey] = 'Entregado';
            updateAdminPanel();
            Swal.fire({ icon: 'success', title: '¡Pedido Entregado!', text: 'El estado se ha actualizado correctamente', confirmButtonColor: '#E8A598', background: '#FDF8F5', timer: 2000 });
        } else {
            Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo identificar el campo de estado', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
        }
    }

    function showOrderInvoice(id) {
        const order = mockOrders.find(x => String(getV(x, ['id', 'nro'])) === String(id));
        if (!order) return;
        let itemsText = '---';
        const rawItems = getV(order, ['produc', 'items']);
        if (rawItems && rawItems !== '---') {
            try {
                const parsed = typeof rawItems === 'string' ? JSON.parse(rawItems) : rawItems;
                if (Array.isArray(parsed)) {
                    itemsText = parsed.map(it => `• ${it.name} (x${it.qty})`).join('\n');
                } else {
                    itemsText = rawItems;
                }
            } catch (e) {
                itemsText = rawItems;
            }
        }

        Swal.fire({
            title: `Factura #${id}`,

    async function checkout() {
        const btn = document.querySelector('#cart-footer .btn-primary');
        const name = document.getElementById('ship-name').value.trim();
        const address = document.getElementById('ship-address').value.trim();
        const phone = document.getElementById('ship-phone').value.trim();

        if (!name || name.length < 2) {
            Swal.fire({ icon: 'warning', title: 'Nombre obligatorio', text: 'Por favor ingresa tu nombre completo para el pedido.', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }
        if (!address || !phone) {
            Swal.fire({ icon: 'warning', title: 'Datos faltantes', text: 'Por favor completa la dirección y el WhatsApp para la entrega.', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            return;
        }

        btn.classList.add('loading');
        const btnTextNode = btn.childNodes[btn.childNodes.length - 1];
        if (btnTextNode.nodeType === Node.TEXT_NODE) btnTextNode.textContent = ' Procesando pedido...';

        Swal.fire({ title: 'Procesando pedido...', text: 'Estamos registrando tu compra, por favor espera un momento.', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }, background: '#FDF8F5' });

        try {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let message = `🥖 *NUEVO PEDIDO - TANIA DIAZ*%0A%0A👤 *Cliente:* ${name}%0A📍 *Dirección:* ${address}%0A📱 *WhatsApp:* ${phone}%0A%0A🛒 *PEDIDO:*%0A`;
            cart.forEach(item => { message += `• ${item.name} x${item.qty} - $${(item.price * item.qty).toLocaleString()}%0A`; });
            message += `%0A💰 *TOTAL: $${total.toLocaleString()}*%0A%0A¡Gracias por tu compra! 🙏`;

            const orderData = {
                cliente: name,
                address: address,
                phone: phone,
                items: cart,
                total: total
            };
            const result = await gsCall('saveOrder', { order: orderData });

            if (result && result.success) {
                window.open(`https://wa.me/${ADMIN_WA_NUMBER}?text=${message}`, '_blank');
                cart = []; updateCartUI(); updateAllBadges(); toggleCart(false);
                Swal.fire({ icon: 'success', title: '¡Pedido enviado!', html: `Se ha abierto WhatsApp para confirmar.<br><small style="opacity:0.5">Server v${result.server_version || '?'}</small>`, confirmButtonColor: '#E8A598', background: '#FDF8F5' });
            } else {
                throw new Error(result ? result.error : 'Fallo en el servidor');
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Error al procesar', text: 'No pudimos registrar tu pedido. Por favor intenta de nuevo.', confirmButtonColor: '#E8A598', background: '#FDF8F5' });
        } finally {
            btn.classList.remove('loading');
            if (btnTextNode.nodeType === Node.TEXT_NODE) btnTextNode.textContent = ' Finalizar Compra';
        }
    }

    function adjustColor(color, amount) {
        try {
            const colorStr = String(color).replace('#', '');
            const num = parseInt(colorStr, 16);
            if (isNaN(num)) return color;
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        } catch (e) { return color; }
    }

    async function handleCmsFile(input, target) { if (input.files[0]) { cropTarget = target; startCrop(await processImageUpload(input.files[0]), target === 'logo' ? 1 : (16 / 9)); } }
    function processImageUpload(file) { return new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); }); }
    function startCrop(base64, ratio = 1) { document.getElementById('cropper-modal').style.display = 'flex'; const img = document.getElementById('cropper-image'); img.src = base64; if (cropper) cropper.destroy(); cropper = new Cropper(img, { aspectRatio: ratio, viewMode: 1 }); }
    function cancelCrop() { document.getElementById('cropper-modal').style.display = 'none'; if (cropper) cropper.destroy(); cropTarget = null; }
    function finishCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 1200, height: 1200 });
        const base64 = canvas.toDataURL('image/jpeg', 0.85);
        if (cropTarget === 'logo') { const p = document.getElementById('cms-logo-preview'); p.src = base64; p.dataset.base64 = base64; p.style.display = 'block'; }
        else if (cropTarget === 'slide') { const p = document.getElementById('slide-img-preview'); if (p) { p.src = base64; p.dataset.base64 = base64; p.style.display = 'block'; } }
        else { const preview = document.getElementById('swal-img-preview'); if (preview) { preview.src = base64; preview.dataset.base64 = base64; preview.style.display = 'block'; } }
        cancelCrop();
    }

    window.onload = () => { init().catch(e => { console.error("Error:", e); renderHeroSlides(); }); };
</script>
