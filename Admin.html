<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | TANIA DIAZ</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <?!= include('Styles'); ?>
</head>

<body>

    <header>
        <div class="container nav-bar">
            <a href="javascript:void(0)" onclick="window.location.href='?p=home'" class="logo-container">
                <img id="main-logo" src="logo_tania.png" class="logo-img" onerror="handleLogoError(this)">
                <div class="logo-fallback">TD</div>
                <span class="logo-text">TANIA DIAZ - ADMIN</span>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a onclick="window.location.href='?p=home'">VOLVER A LA TIENDA</a></li>
                    <li><a onclick="logoutAdmin()" style="font-weight:700;">SALIR</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="view-admin" class="view active">
            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-top:40px; margin-bottom:40px;">
                <h2>Panel Maestro</h2>
            </div>

            <div class="admin-dashboard">
                <div class="stat-card">
                    <p id="stat-total">$0.00</p>
                    <h4>Ventas</h4>
                </div>
                <div class="stat-card">
                    <p id="stat-orders">0</p>
                    <h4>Pedidos</h4>
                </div>
                <div class="stat-card">
                    <p id="stat-low-stock">0</p>
                    <h4>Stock Bajo</h4>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="switchAdminTab('orders')" class="btn-add"
                    style="width:auto; background:var(--primary);">PEDIDOS</button>
                <button onclick="switchAdminTab('products')" class="btn-add"
                    style="width:auto; background:#333;">PRODUCTOS</button>
                <button onclick="switchAdminTab('settings')" class="btn-add"
                    style="width:auto; background:#333;">CMS</button>
            </div>

            <div id="admin-tab-orders">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>WhatsApp</th>
                            <th>Dirección</th>
                            <th style="width: 25%;">Pedido</th>
                            <th>Total</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-list"></tbody>
                </table>
            </div>

            <div id="admin-tab-products" style="display:none;">
                <button onclick="openProductModal()" class="btn-add" style="width:auto; margin-bottom:20px;">+ NUEVO
                    PRODUCTO</button>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-list"></tbody>
                </table>
            </div>

            <div id="admin-tab-settings" style="display:none;">
                <div style="background:white; padding:30px; border-radius:30px;">
                    <h3>Configuración Visual</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                        <div><label>Título del Sitio</label><input id="cms-site-title" class="cms-input"></div>
                        <div><label>Color Principal</label><input id="cms-site-color" type="color" class="cms-input">
                        </div>
                        <div><label>URL Logo</label><input id="cms-site-logo" class="cms-input"></div>
                        <div><label>Foto Banner 1</label><input id="cms-slide1-img" class="cms-input"></div>
                    </div>
                    <button onclick="applyCMS()" class="btn-add" style="margin-top:20px;">GUARDAR CAMBIOS</button>
                </div>
            </div>
        </div>
    </main>

    <?!= include('Scripts'); ?>
    <script>
        // Forzar vista admin e inicializar
        window.onload = () => {
            init();
            setTimeout(() => {
                isAdmin = true;
                updateAdminPanel();
            }, 500);
        };
    </script>
</body>

</html>
